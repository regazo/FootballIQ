<!DOCTYPE html>
<html>
<head>
<title>FootballIQ</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(#070513,#1a1229);
  color:white;
}

.nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#120d25;
}

.container {
  padding:20px;
}

.card {
  background:#1f1833;
  padding:20px;
  margin:15px 0;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover {
  transform: scale(1.02);
}

button {
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

input {
  padding:8px;
  margin-right:10px;
  border-radius:6px;
  border:none;
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const e = React.createElement;

function App(){

  const [matches,setMatches] = React.useState([]);
  const [selected,setSelected] = React.useState(null);
  const [prediction,setPrediction] = React.useState(null);
  const [search,setSearch] = React.useState("");
  const [dateFilter,setDateFilter] = React.useState("");

  React.useEffect(()=>{
    fetch("http://127.0.0.1:8000/real-matches")
    .then(r=>r.json())
    .then(setMatches);
  },[]);

  function loadPrediction(id){
    fetch("http://127.0.0.1:8000/prediction/" + id)
    .then(r=>r.json())
    .then(data=>{
      setPrediction(data);
      setSelected(id);
    });
  }

  return e("div",null,

    e("div",{className:"nav"},
      e("h2",null,"⚽ FootballIQ")
    ),

    e("div",{className:"container"},

      // FILTER INPUTS
      e("div",null,

        e("input",{
          placeholder:"Search team...",
          value:search,
          onChange:e=>setSearch(e.target.value)
        }),

        e("input",{
          type:"date",
          value:dateFilter,
          onChange:e=>setDateFilter(e.target.value)
        })

      ),

      // MATCHES
      matches
        .filter(m =>
          (m.home.toLowerCase().includes(search.toLowerCase()) ||
           m.away.toLowerCase().includes(search.toLowerCase())) &&
          (dateFilter === "" || m.date === dateFilter)
        )
        .map(m =>
          e("div",{className:"card",key:m.id},

            e("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},

  e("img",{src:m.homeLogo,style:{width:"30px"}}),
  e("h3",null,m.home + " vs " + m.away),
  e("img",{src:m.awayLogo,style:{width:"30px"}})

),
m.status === "LIVE" && e("p",{
  style:{color:"red",fontWeight:"bold"}
},"🔴 LIVE"),
            e("p",null,"🏆 " + m.competition),
            e("p",null,"📅 " + m.date),
            e("p",null,"⏰ " + m.time),

            e("button",{onClick:()=>loadPrediction(m.id)},"View Prediction"),

            selected === m.id && prediction && e("div",null,

              e("p",null,"Home Win: " + prediction.home + "%"),
              e("div",{style:{
                height:"10px",
                width:prediction.home+"%",
                background:"green",
                borderRadius:"5px",
                marginBottom:"10px"
              }}),

              e("p",null,"Draw: " + prediction.draw + "%"),
              e("div",{style:{
                height:"10px",
                width:prediction.draw+"%",
                background:"orange",
                borderRadius:"5px",
                marginBottom:"10px"
              }}),

              e("p",null,"Away Win: " + prediction.away + "%"),
              e("div",{style:{
                height:"10px",
                width:prediction.away+"%",
                background:"red",
                borderRadius:"5px",
                marginBottom:"10px"
              }}),

              e("p",null,"Reason: " + prediction.reason)
            )

          )
        )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
