<!DOCTYPE html>
<html>
<head>
<title>FootballIQ</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background:#0d1117;
  color:#e6edf3;
}

.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:#161b22;
  border-bottom:1px solid #30363d;
}

.container {
  padding:30px;
  max-width:1300px;
  margin:auto;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card {
  background:#161b22;
  padding:20px;
  border-radius:12px;
  border:1px solid #30363d;
  transition:0.2s;
}

.card:hover {
  border-color:#58a6ff;
  transform: translateY(-3px);
}

button {
  background:#238636;
  color:white;
  border:none;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
}

button:hover {
  background:#2ea043;
}

input {
  background:#0d1117;
  border:1px solid #30363d;
  color:white;
  padding:10px;
  border-radius:6px;
  width:100%;
  margin-bottom:20px;
}

/* LIVE */
.live {
  color:#ff3b3b;
  font-weight:bold;
}

/* POPUP */
.popup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:flex;
  justify-content:center;
  align-items:center;
}

.popup-inner {
  background:#1f1833;
  padding:30px;
  border-radius:20px;
  width:350px;
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const e = React.createElement;

function App(){

  const [matches,setMatches] = React.useState([]);
  const [tab,setTab] = React.useState("matches");
  const [search,setSearch] = React.useState("");
  const [compare,setCompare] = React.useState([]);
  const [activeMatch,setActiveMatch] = React.useState(null);
  const [players,setPlayers] = React.useState([]);
const [view,setView] = React.useState("matches");
const grouped = {};

matches.forEach(m=>{
  if(!grouped[m.competition]) grouped[m.competition]=[];
  grouped[m.competition].push(m);
});

  React.useEffect(()=>{
    fetch("http://127.0.0.1:8000/real-matches")
    .then(r=>r.json())
    .then(setMatches);
  },[]);

  // 🔍 SEARCH FILTER
  const filteredMatches = matches.filter(m =>
    m.home.toLowerCase().includes(search.toLowerCase()) ||
    m.away.toLowerCase().includes(search.toLowerCase())
  );

  return e("div",null,

    //  NAVBAR WITH TABS
    e("div",{className:"nav"},

      e("h2",null,"⚽ FootballIQ"),

      e("div",null,
        e("button",{onClick:()=>setTab("matches")},"Matches"),
        e("button",{onClick:()=>setTab("teams")},"Teams"),
        e("button",{onClick:()=>setTab("players")},"Players")
      )
    ),

    e("div",{className:"container"},

      // 🔍 SEARCH BAR
      e("input",{
        placeholder:"Search teams or players...",
        value:search,
        onChange:e=>setSearch(e.target.value)
      }),

      // ======================
      // MATCHES TAB
      // ======================
      tab === "matches" && e("div",{className:"grid"},

        filteredMatches.map(m =>
          e("div",{className:"card",key:m.id,onClick:()=>setActiveMatch(m)},

            e("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},

              e("img",{src:m.homeLogo,style:{width:"30px"}}),
              e("h3",null,m.home + " vs " + m.away),
              e("img",{src:m.awayLogo,style:{width:"30px"}})

            ),

            e("p",null,"🏆 " + m.competition),
            e("p",null,"📅 " + m.date),
            e("p",null,"⏰ " + m.time),
            e("button",{
  onClick:(ev)=>{
    ev.stopPropagation();
    fetch("http://127.0.0.1:8000/team-players/" + m.homeId)
    .then(r=>r.json())
    .then(data=>{
      setPlayers(data);
      setView("players");
    });
  }
},"View Players"),

e("button",{
  onClick:(ev)=>{
    ev.stopPropagation();
    setCompare([...compare, m.home].slice(-2));
  }
},"Compare"),

            m.status === "LIVE" && e("p",{className:"live"},"🔴 LIVE")
          )
        )
      ),

      // ======================
      // TEAMS TAB
      // ======================
      tab === "teams" && e("div",{className:"grid"},

        [...new Set(matches.map(m => m.home))].map(team =>
          e("div",{className:"card",key:team},

            e("h3",null,team),
            e("p",null,"Click to view matches")
          )
        )
      ),

      // ======================
      // PLAYERS TAB (MOCK FOR NOW)
      // ======================
      tab === "players" && e("div",{className:"grid"},

        ["Messi","Ronaldo","Mbappe","Haaland"].filter(p =>
          p.toLowerCase().includes(search.toLowerCase())
        ).map(p =>
          e("div",{className:"card",key:p},

            e("h3",null,p),
            e("p",null,"Player profile coming soon")
          )
        )
      )

 ),

view === "players" && e("div",{className:"container"},
  e("div",{className:"grid"},
    players.map((p,i)=>
      e("div",{className:"card",key:i},
        e("h3",null,p.name),
        e("p",null,"Position: " + p.position),
        e("p",null,"Nationality: " + p.nationality)
      )
    )
  )
),

compare.length === 2 && e("div",{className:"container"},
  e("div",{className:"card"},
    e("h2",null,"Comparison"),
    e("p",null,compare[0] + " vs " + compare[1])
  )
),
    //  POPUP
    activeMatch && e("div",{
      style:{
        position:"fixed",
        top:0,left:0,
        width:"100%",height:"100%",
        background:"rgba(0,0,0,0.8)",
        display:"flex",
        justifyContent:"center",
        alignItems:"center"
      }
    },

      e("div",{
        style:{
          background:"#1f1833",
          padding:"30px",
          borderRadius:"15px"
        }
      },

        e("h2",null,activeMatch.home + " vs " + activeMatch.away),

        e("p",null,"🏆 " + activeMatch.competition),
        e("p",null,"📅 " + activeMatch.date),

        e("button",{onClick:()=>setActiveMatch(null)},"Close")
      )
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
