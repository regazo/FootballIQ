
<!DOCTYPE html>
<html>
<head>
<title>Football Pro</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(#070513,#1a1229);
  color:white;
}
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#120d25;
}
.container {
  padding:20px;
}
.card {
  background:#1f1833;
  padding:20px;
  margin:15px 0;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
  transition:0.3s;
}
.card:hover {
  transform:scale(1.02);
}
.bar {
  height:10px;
  margin:5px 0;
}
button {
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const e = React.createElement;

function App(){
  const [matches,setMatches] = React.useState([]);
  const [selected,setSelected] = React.useState(null);
  const [prediction,setPrediction] = React.useState(null);

  React.useEffect(()=>{
    fetch("http://127.0.0.1:8000/matches")
    .then(r=>r.json())
    .then(setMatches);
  },[]);

  function loadPrediction(id){
    fetch("http://127.0.0.1:8000/prediction/" + id)
    .then(r=>r.json())
    .then(data=>{
      setPrediction(data);
      setSelected(id);
    });
  }

  return e("div",null,
    e("div",{className:"nav"}, e("h2",null,"⚽ Football Pro App")),
    e("div",{className:"container"},
      matches.map(m =>
        e("div",{className:"card",key:m.id},
          e("h3",null,m.home + " vs " + m.away),
          e("p",null,"📅 " + m.date + " | ⏰ " + m.time),
          e("button",{onClick:()=>loadPrediction(m.id)},"View Prediction"),

          selected === m.id && prediction && e("div",null,
            e("p",null,"Home Win: " + prediction.home + "%"),
            e("div",{className:"bar",style:{width:prediction.home + "%", background:"green"}}),
            e("p",null,"Draw: " + prediction.draw + "%"),
            e("div",{className:"bar",style:{width:prediction.draw + "%", background:"orange"}}),
            e("p",null,"Away Win: " + prediction.away + "%"),
            e("div",{className:"bar",style:{width:prediction.away + "%", background:"red"}}),
            e("p",null,"💡 " + prediction.reason)
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
